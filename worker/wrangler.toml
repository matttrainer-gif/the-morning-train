name = "morning-train"
main = "index.js"
compatibility_date = "2024-01-01"

# Free tier is fine — 100K requests/day
# Deploy with: npx wrangler deploy
#
# For the Inquiry Desk (POST /query), add your Anthropic API key as a secret:
#   npx wrangler secret put ANTHROPIC_API_KEY
#
# For Personalization, create a KV namespace:
#   npx wrangler kv namespace create PREFS
# Then paste the ID below:

[[kv_namespaces]]
binding = "PREFS"
id = "8b689547ca824afaaff5ab622e6940cc"

# Cron trigger — fire daily at 14:00 UTC (7 AM PDT) to dispatch GitHub Actions digest
[triggers]
crons = ["0 14 * * *"]
